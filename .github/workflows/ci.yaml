name: C++ CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up MSYS2 (MINGW64 + Clang)
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: false
        install: >-
          mingw-w64-x86_64-clang
          mingw-w64-x86_64-lld
          mingw-w64-x86_64-cmake
          mingw-w64-x86_64-ninja

    - name: Configure CMake
      run: cmake -S . -B build -G Ninja -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DAX_BUILD_CONFIG=Development

    - name: Build
      run: cmake --build build

    - name: Run FoundationTests
      run: build/bin/FoundationTests.exe --gtest_output=xml:build/test-results/foundation.xml

    - name: Run AxEngineTests
      run: build/bin/AxEngineTests.exe --gtest_output=xml:build/test-results/engine.xml

    - name: Run AxLogTests
      run: build/bin/AxLogTests.exe --gtest_output=xml:build/test-results/log.xml

    - name: Run AxResourceTests
      run: build/bin/AxResourceTests.exe --gtest_output=xml:build/test-results/resource.xml
